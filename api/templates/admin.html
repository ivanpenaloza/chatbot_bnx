<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satriani — Admin Console</title>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a0a;--surface:#141414;--card:#1a1a1a;--border:#262626;--text:#ededed;--muted:#888;--white:#fff;--danger:#ef4444;--success:#22c55e;--accent:#3b82f6;--radius:12px;--font:system-ui,-apple-system,'Segoe UI',sans-serif}
        body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

        .header{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .header-left{display:flex;align-items:center;gap:10px}
        .header-logo{width:28px;height:28px;display:flex;align-items:center;justify-content:center}
        .header-title{font-size:.95rem;font-weight:700}
        .header-badge{padding:3px 10px;border-radius:4px;font-size:.65rem;font-weight:600;background:rgba(255,255,255,.08);color:var(--muted);margin-left:8px}
        .header-right{display:flex;align-items:center;gap:12px}
        .header-banamex-logo{height:22px;width:auto;filter:grayscale(1) brightness(0) invert(1);opacity:.7}
        .header-user{font-size:.8rem;color:var(--muted)}
        .logout-btn{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);font-size:.78rem;cursor:pointer;font-family:var(--font)}
        .logout-btn:hover{background:rgba(255,255,255,.06)}

        .container{max-width:1060px;margin:0 auto;padding:32px 24px}
        .section{margin-bottom:32px}
        .section-title{font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .section-title svg{width:18px;height:18px;stroke:var(--muted)}

        .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:10px}
        .card-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
        .card-info{flex:1;min-width:0}
        .card-name{font-size:.86rem;font-weight:600}
        .card-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
        .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.62rem;font-weight:600}
        .badge.green{background:rgba(34,197,94,.12);color:var(--success)}
        .badge.red{background:rgba(239,68,68,.12);color:var(--danger)}
        .badge.gray{background:rgba(255,255,255,.06);color:var(--muted)}
        .badge.blue{background:rgba(59,130,246,.12);color:var(--accent)}

        .btn{padding:7px 14px;border-radius:8px;font-family:var(--font);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;border:none}
        .btn-primary{background:var(--white);color:#0a0a0a}
        .btn-primary:hover{background:#e5e5e5}
        .btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(239,68,68,.3)}
        .btn-danger:hover{background:rgba(239,68,68,.08)}
        .btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
        .btn-outline:hover{background:rgba(255,255,255,.06)}
        .btn-sm{padding:5px 10px;font-size:.72rem}
        .btn:disabled{opacity:.4;cursor:not-allowed}
        .btn-group{display:flex;gap:6px}

        .upload-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,10,.82);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;animation:overlayIn .25s ease}
        .upload-overlay.active{display:flex}
        @keyframes overlayIn{from{opacity:0}to{opacity:1}}
        .upload-modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px 40px;width:100%;max-width:520px;position:relative;animation:modalIn .3s ease}
        @keyframes modalIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
        .upload-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
        .upload-modal-title{font-size:.95rem;font-weight:700}
        .upload-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .15s}
        .upload-close:hover{background:rgba(255,255,255,.06);color:var(--text)}
        .upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 28px;text-align:center;cursor:pointer;transition:all .2s}
        .upload-area:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.02)}
        .upload-area.dragover{border-color:var(--white);background:rgba(255,255,255,.04)}
        .upload-icon{margin-bottom:8px}
        .upload-icon svg{width:32px;height:32px;stroke:var(--muted)}
        .upload-text{font-size:.85rem;color:var(--muted)}
        .upload-hint{font-size:.7rem;color:var(--muted);margin-top:4px;opacity:.7}
        .upload-file-list{margin-top:16px;max-height:160px;overflow-y:auto}
        .upload-file-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:.8rem}
        .upload-file-item .file-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .upload-file-item .file-size{color:var(--muted);font-size:.7rem;margin-left:10px;flex-shrink:0}
        .upload-file-remove{background:none;border:none;color:var(--danger);cursor:pointer;font-size:.9rem;padding:0 4px;margin-left:8px;flex-shrink:0}
        .upload-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
        input[type="file"]{display:none}

        .doc-check{width:16px;height:16px;accent-color:var(--white);cursor:pointer;flex-shrink:0}

        .form-row{display:flex;gap:10px;align-items:flex-end;margin-top:12px}
        .form-group{flex:1}
        .form-label{display:block;font-size:.7rem;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
        .form-input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:.85rem;outline:none}
        .form-input:focus{border-color:rgba(255,255,255,.3)}
        select.form-input{cursor:pointer}

        .user-table{width:100%;border-collapse:collapse}
        .user-table th,.user-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:.82rem}
        .user-table th{color:var(--muted);font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

        .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:.82rem;font-weight:600;z-index:200;display:none;animation:slideIn .3s}
        .toast.success{background:var(--success);color:#fff}
        .toast.error{background:var(--danger);color:#fff}
        @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

        .ingesting-spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--muted);border-top-color:var(--white);border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty-state{text-align:center;padding:24px;color:var(--muted);font-size:.82rem}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-logo"><svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="32" height="32" rx="8" fill="white"/><path d="M16 6L16 26" stroke="#0a0a0a" stroke-width="2.2" stroke-linecap="round"/><path d="M10 10C10 10 13 13 16 13C19 13 22 10 22 10" stroke="#0a0a0a" stroke-width="2.2" stroke-linecap="round" fill="none"/><path d="M10 17C10 17 13 20 16 20C19 20 22 17 22 17" stroke="#0a0a0a" stroke-width="2.2" stroke-linecap="round" fill="none"/><circle cx="16" cy="25" r="1.5" fill="#0a0a0a"/></svg></div>
            <div class="header-title">Satriani</div>
            <div class="header-badge">Admin Console</div>
        </div>
        <div class="header-right">
            <img src="/static/images/banamex_brand.png" alt="Banamex" class="header-banamex-logo">
            <span class="header-user" id="adminName">admin</span>
            <button class="logout-btn" onclick="doLogout()">Sign Out</button>
        </div>
    </div>

    <!-- Upload Overlay -->
    <div class="upload-overlay" id="uploadOverlay">
        <div class="upload-modal">
            <div class="upload-modal-header">
                <div class="upload-modal-title">Upload New Documents</div>
                <button class="upload-close" onclick="closeUploadOverlay()" aria-label="Close">&times;</button>
            </div>
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
                <div class="upload-text">Click or drag files here</div>
                <div class="upload-hint">.docx and .pdf files · Max 50 MB each</div>
            </div>
            <div class="upload-file-list" id="uploadFileList"></div>
            <div class="upload-actions" id="uploadActions" style="display:none">
                <button class="btn btn-outline" onclick="clearPendingFiles()">Clear</button>
                <button class="btn btn-primary" id="uploadSubmitBtn" onclick="submitPendingFiles()">Upload</button>
            </div>
            <input type="file" id="fileInput" accept=".docx,.pdf" multiple onchange="addPendingFiles(this.files)">
        </div>
    </div>

    <div class="container">
        <!-- LIST 1: DOCUMENTS -->
        <div class="section">
            <div class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Documents
            </div>
            <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                <div style="display:flex;flex-direction:column;gap:4px">
                    <label class="form-label" style="margin:0">Embedding Model</label>
                    <select class="form-input" id="embModelSelect" style="width:auto;min-width:220px"><option value="">Loading...</option></select>
                </div>
                <button class="btn btn-primary" id="ingestSelectedBtn" onclick="ingestSelected()" style="align-self:flex-end">Ingest Selected</button>
                <button class="btn btn-outline" id="selectAllBtn" onclick="toggleSelectAll()" style="align-self:flex-end">Select All</button>
                <button class="btn btn-outline" onclick="openUploadOverlay()" style="align-self:flex-end">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload New Documents
                </button>
            </div>
            <div id="docList"><div class="empty-state">Loading documents...</div></div>
        </div>

        <!-- LIST 2: EMBEDDINGS (ChromaDB Collections) -->
        <div class="section">
            <div class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
                Embeddings (ChromaDB Collections)
            </div>
            <div id="embeddingList"><div class="empty-state">Loading embeddings...</div></div>
        </div>

        <!-- USER MANAGEMENT -->
        <div class="section">
            <div class="section-title">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                User Management
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Username</label><input class="form-input" id="newUser" placeholder="username"></div>
                <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="newPass" type="password" placeholder="password"></div>
                <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="newName" placeholder="Full Name"></div>
                <button class="btn btn-primary" onclick="registerUser()" style="margin-bottom:0;height:38px">Add User</button>
            </div>
            <table class="user-table" style="margin-top:16px">
                <thead><tr><th>Username</th><th>Full Name</th><th>Role</th><th></th></tr></thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function(){
        var token=sessionStorage.getItem('satriani_token');
        if(!token){window.location.href='/';return;}
        var userInfo=JSON.parse(sessionStorage.getItem('satriani_user')||'{}');
        if(userInfo.role!=='admin'){window.location.href='/api/v1/rag/chat';return;}
        document.getElementById('adminName').textContent=userInfo.full_name||userInfo.username||'admin';

        var headers={'Content-Type':'application/json','Authorization':'Bearer '+token};
        var headersNoBody={'Authorization':'Bearer '+token};

        async function verifySession(){
            try{
                var res=await fetch('/api/v1/auth/me',{headers:headersNoBody});
                if(!res.ok){sessionStorage.clear();window.location.href='/';return false;}
                return true;
            }catch(e){sessionStorage.clear();window.location.href='/';return false;}
        }

        function toast(msg,type){
            var t=document.getElementById('toast');
            t.textContent=msg;t.className='toast '+(type||'success');t.style.display='block';
            setTimeout(function(){t.style.display='none';},3500);
        }

        // ── Embedding Models (dropdown) ──
        async function loadEmbeddingModels(){
            var sel=document.getElementById('embModelSelect');
            try{
                var res=await fetch('/api/v1/admin/embedding-models',{headers:headersNoBody});
                if(!res.ok){sel.innerHTML='<option value="">Error loading models</option>';return;}
                var data=await res.json();
                sel.innerHTML='';
                (data.models||[]).forEach(function(m){
                    var opt=document.createElement('option');
                    opt.value=m.key;
                    opt.textContent=m.display_name+(m.available?'':' (not downloaded)');
                    if(m.active)opt.selected=true;
                    sel.appendChild(opt);
                });
                if(!sel.options.length)sel.innerHTML='<option value="">No models</option>';
            }catch(e){console.error(e);sel.innerHTML='<option value="">Error</option>';}
        }

        // ── Documents List ──
        async function loadDocuments(){
            try{
                var res=await fetch('/api/v1/rag/documents',{headers:headersNoBody});
                var data=await res.json();
                var el=document.getElementById('docList');
                el.innerHTML='';
                var docs=data.documents||[];
                if(!docs.length){el.innerHTML='<div class="empty-state">No documents found. Upload files above.</div>';return;}
                docs.forEach(function(d){
                    // Group by filename: show one card per file with all its embedding badges
                    var existing=el.querySelector('[data-doc-filename="'+d.filename+'"]');
                    if(existing){
                        // Append another embedding badge to existing card
                        if(d.ingested){
                            var metaEl=existing.querySelector('.card-meta-badges');
                            metaEl.innerHTML+='<span class="badge green" style="margin-right:4px">'+d.embedding_model+' · '+d.chunks+' chunks</span>';
                        }
                        return;
                    }
                    var statusBadge=d.ingested
                        ?'<span class="badge green">'+d.embedding_model+' · '+d.chunks+' chunks</span>'
                        :'<span class="badge gray">Not ingested</span>';
                    var card=document.createElement('div');
                    card.className='card';
                    card.setAttribute('data-doc-filename',d.filename);
                    card.innerHTML='<div class="card-row">'
                        +'<input type="checkbox" class="doc-check" data-filename="'+d.filename+'" aria-label="Select '+d.filename+'">'
                        +'<div class="card-info">'
                        +'<div class="card-name">'+d.filename+'</div>'
                        +'<div class="card-meta">'+d.size_kb+' KB · <span class="card-meta-badges">'+statusBadge+'</span></div>'
                        +'</div>'
                        +'<button class="btn btn-danger btn-sm" onclick="deleteDoc(\''+d.filename+'\')">Delete File</button>'
                        +'</div>';
                    el.appendChild(card);
                });
            }catch(e){console.error(e);}
        }

        // ── Embeddings List (ChromaDB collections) ──
        async function loadEmbeddings(){
            try{
                var res=await fetch('/api/v1/admin/embeddings',{headers:headersNoBody});
                var data=await res.json();
                var el=document.getElementById('embeddingList');
                el.innerHTML='';
                var embs=data.embeddings||[];
                if(!embs.length){el.innerHTML='<div class="empty-state">No embeddings in ChromaDB yet.</div>';return;}
                embs.forEach(function(e){
                    var card=document.createElement('div');
                    card.className='card';
                    card.innerHTML='<div class="card-row">'
                        +'<div class="card-info">'
                        +'<div class="card-name">'+e.collection_name+'</div>'
                        +'<div class="card-meta">Source: '+e.source_file+' · Model: <span class="badge blue">'+e.embedding_model+'</span> · '+e.chunks+' chunks</div>'
                        +'</div>'
                        +'<button class="btn btn-danger btn-sm" onclick="deleteEmbedding(\''+e.collection_name+'\')">Delete Embedding</button>'
                        +'</div>';
                    el.appendChild(card);
                });
            }catch(ex){console.error(ex);}
        }

        // ── Upload Overlay ──
        var pendingFiles=[];

        window.openUploadOverlay=function(){
            pendingFiles=[];
            renderPendingFiles();
            document.getElementById('uploadOverlay').classList.add('active');
        };

        window.closeUploadOverlay=function(){
            document.getElementById('uploadOverlay').classList.remove('active');
            pendingFiles=[];
            renderPendingFiles();
            document.getElementById('fileInput').value='';
        };

        // Close overlay when clicking backdrop
        document.getElementById('uploadOverlay').addEventListener('click',function(ev){
            if(ev.target===this)closeUploadOverlay();
        });
        // Close on Escape
        document.addEventListener('keydown',function(ev){
            if(ev.key==='Escape'&&document.getElementById('uploadOverlay').classList.contains('active'))closeUploadOverlay();
        });

        function renderPendingFiles(){
            var list=document.getElementById('uploadFileList');
            var actions=document.getElementById('uploadActions');
            list.innerHTML='';
            if(!pendingFiles.length){actions.style.display='none';return;}
            actions.style.display='flex';
            pendingFiles.forEach(function(f,i){
                var item=document.createElement('div');
                item.className='upload-file-item';
                item.innerHTML='<span class="file-name">'+f.name+'</span><span class="file-size">'+(f.size/1024).toFixed(1)+' KB</span><button class="upload-file-remove" onclick="removePendingFile('+i+')" aria-label="Remove">&times;</button>';
                list.appendChild(item);
            });
        }

        window.addPendingFiles=function(fileList){
            for(var i=0;i<fileList.length;i++){
                var name=fileList[i].name.toLowerCase();
                if(name.endsWith('.docx')||name.endsWith('.pdf')){
                    // Avoid duplicates
                    var dup=pendingFiles.some(function(p){return p.name===fileList[i].name&&p.size===fileList[i].size;});
                    if(!dup)pendingFiles.push(fileList[i]);
                }else{
                    toast('Skipped "'+fileList[i].name+'": only .docx and .pdf allowed','error');
                }
            }
            document.getElementById('fileInput').value='';
            renderPendingFiles();
        };

        window.removePendingFile=function(idx){
            pendingFiles.splice(idx,1);
            renderPendingFiles();
        };

        window.clearPendingFiles=function(){
            pendingFiles=[];
            renderPendingFiles();
        };

        window.submitPendingFiles=async function(){
            if(!pendingFiles.length)return;
            var btn=document.getElementById('uploadSubmitBtn');
            btn.disabled=true;btn.innerHTML='<span class="ingesting-spinner"></span>Uploading...';
            for(var i=0;i<pendingFiles.length;i++){
                var f=pendingFiles[i];
                var fd=new FormData();fd.append('file',f);
                try{
                    var res=await fetch('/api/v1/admin/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd});
                    if(!res.ok){var e=await res.json();toast(e.detail||'Upload failed','error');continue;}
                    toast('Uploaded: '+f.name);
                }catch(ex){toast('Upload error','error');}
            }
            btn.disabled=false;btn.textContent='Upload';
            closeUploadOverlay();
            loadDocuments();
        };

        // Prevent browser from opening dropped files
        document.addEventListener('dragover',function(ev){ev.preventDefault();});
        document.addEventListener('drop',function(ev){ev.preventDefault();});

        var uploadArea=document.getElementById('uploadArea');
        uploadArea.addEventListener('dragenter',function(ev){ev.preventDefault();ev.stopPropagation();this.classList.add('dragover');});
        uploadArea.addEventListener('dragover',function(ev){ev.preventDefault();ev.stopPropagation();this.classList.add('dragover');});
        uploadArea.addEventListener('dragleave',function(ev){ev.preventDefault();ev.stopPropagation();this.classList.remove('dragover');});
        uploadArea.addEventListener('drop',function(ev){ev.preventDefault();ev.stopPropagation();this.classList.remove('dragover');if(ev.dataTransfer&&ev.dataTransfer.files&&ev.dataTransfer.files.length>0){addPendingFiles(ev.dataTransfer.files);}});

        // ── Select All / Deselect All ──
        window.toggleSelectAll=function(){
            var boxes=document.querySelectorAll('.doc-check');
            var allChecked=Array.prototype.every.call(boxes,function(b){return b.checked;});
            boxes.forEach(function(b){b.checked=!allChecked;});
            document.getElementById('selectAllBtn').textContent=allChecked?'Select All':'Deselect All';
        };

        // ── Ingest Selected (one-by-one) ──
        window.ingestSelected=async function(){
            var boxes=document.querySelectorAll('.doc-check:checked');
            var filenames=Array.prototype.map.call(boxes,function(b){return b.dataset.filename;});
            if(!filenames.length){toast('Select at least one document to ingest','error');return;}
            var btn=document.getElementById('ingestSelectedBtn');
            btn.disabled=true;btn.innerHTML='<span class="ingesting-spinner"></span>Ingesting...';
            var embKey=document.getElementById('embModelSelect').value;
            var successCount=0;var totalChunks=0;
            for(var i=0;i<filenames.length;i++){
                try{
                    var res=await fetch('/api/v1/rag/ingest',{method:'POST',headers:headers,body:JSON.stringify({filename:filenames[i],embedding_key:embKey})});
                    if(!res.ok){var err=await res.json();toast('Error ingesting '+filenames[i]+': '+(err.detail||'unknown'),'error');continue;}
                    var data=await res.json();
                    var r=(data.results||[])[0];
                    if(r&&r.status==='already_ingested'){
                        toast(filenames[i]+' already ingested with model "'+embKey+'"','error');
                        continue;
                    }
                    (data.results||[]).forEach(function(r){totalChunks+=r.chunks;});
                    successCount++;
                }catch(ex){toast('Error ingesting '+filenames[i],'error');}
            }
            if(successCount>0)toast('Ingested '+successCount+' file(s), '+totalChunks+' total chunks');
            btn.disabled=false;btn.textContent='Ingest Selected';
            loadDocuments();
            loadEmbeddings();
        };

        // ── Delete Document (file only) ──
        window.deleteDoc=async function(fname){
            if(!confirm('Delete file "'+fname+'"? This only removes the file, not its embedding.'))return;
            try{
                var res=await fetch('/api/v1/admin/documents/'+encodeURIComponent(fname),{method:'DELETE',headers:headersNoBody});
                if(res.ok)toast('Deleted file: '+fname);
                else toast('Delete failed','error');
                loadDocuments();
            }catch(e){toast('Error','error');}
        };

        // ── Delete Embedding (ChromaDB collection only) ──
        window.deleteEmbedding=async function(colName){
            if(!confirm('Delete embedding collection "'+colName+'"? This only removes the embedding, not the source file.'))return;
            try{
                var res=await fetch('/api/v1/admin/embeddings/'+encodeURIComponent(colName),{method:'DELETE',headers:headersNoBody});
                if(res.ok)toast('Deleted embedding: '+colName);
                else toast('Delete failed','error');
                loadEmbeddings();
                loadDocuments();
            }catch(e){toast('Error','error');}
        };

        // ── Users ──
        async function loadUsers(){
            try{
                var res=await fetch('/api/v1/auth/users',{headers:headersNoBody});
                if(!res.ok)return;
                var data=await res.json();
                var tbody=document.getElementById('userTableBody');
                tbody.innerHTML='';
                (data.users||[]).forEach(function(u){
                    var tr=document.createElement('tr');
                    var delBtn=u.role==='admin'?'':'<button class="btn btn-danger btn-sm" onclick="deleteUser(\''+u.username+'\')">Remove</button>';
                    tr.innerHTML='<td>'+u.username+'</td><td>'+u.full_name+'</td><td><span class="badge '+(u.role==='admin'?'gray':'green')+'">'+u.role+'</span></td><td>'+delBtn+'</td>';
                    tbody.appendChild(tr);
                });
            }catch(e){console.error(e);}
        }

        window.registerUser=async function(){
            var u=document.getElementById('newUser').value.trim();
            var p=document.getElementById('newPass').value;
            var n=document.getElementById('newName').value.trim();
            if(!u||!p){toast('Username and password required','error');return;}
            try{
                var res=await fetch('/api/v1/auth/register',{method:'POST',headers:headers,body:JSON.stringify({username:u,password:p,full_name:n})});
                if(!res.ok){var e=await res.json();toast(e.detail||'Error','error');return;}
                toast('User created: '+u);
                document.getElementById('newUser').value='';
                document.getElementById('newPass').value='';
                document.getElementById('newName').value='';
                loadUsers();
            }catch(ex){toast('Error','error');}
        };

        window.deleteUser=async function(uname){
            if(!confirm('Remove user '+uname+'?'))return;
            try{
                var res=await fetch('/api/v1/auth/users/'+encodeURIComponent(uname),{method:'DELETE',headers:headersNoBody});
                if(res.ok)toast('Removed: '+uname);
                else toast('Error','error');
                loadUsers();
            }catch(e){toast('Error','error');}
        };

        window.doLogout=function(){
            fetch('/api/v1/auth/logout',{method:'POST',headers:headersNoBody});
            sessionStorage.clear();
            window.location.href='/';
        };

        // ── Init ──
        verifySession().then(function(valid){
            if(valid){loadEmbeddingModels();loadDocuments();loadEmbeddings();loadUsers();}
        });
    })();
    </script>
</body>
</html>
